name: Docker CI (Go)

on:
  push:
    branches:
      - main
    paths:
      - 'go/**'
      - '.github/workflows/docker-artusx-api-go.yml'

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to Docker Registry
        uses: docker/login-action@v4
        with:
          registry: registry.cn-hongkong.aliyuncs.com
          username: ${{ secrets.ALIYUN_CR_USERNAME }}
          password: ${{ secrets.ALIYUN_CR_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v7
        with:
          platforms: linux/amd64
          context: '{{defaultContext}}'
          file: go/cmd/artusx-api/Dockerfile
          push: true
          tags: registry.cn-hongkong.aliyuncs.com/suyi/artusx-api-golang:latest
