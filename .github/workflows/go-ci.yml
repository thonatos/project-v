name: Go CI

on:
  push:
    branches: ['main']
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下文件未格式化："
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Lint
        # 用 CI 的 go1.26 工具链安装并运行 golangci-lint v2，
        # 避免 golangci-lint-action 预编译二进制的构建 Go 版本低于 go.mod 目标版本
        # 而报 "go language version used to build golangci-lint is lower" 的问题。
        run: |
          go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.12.2
          "$(go env GOPATH)/bin/golangci-lint" run ./...
