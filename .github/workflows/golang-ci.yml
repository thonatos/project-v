name: Go CI

on:
  push:
    branches: ['main']
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'
  pull_request:
    branches: ['main']
    paths:
      - 'go/**'
      - '.github/workflows/go-ci.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
          cache-dependency-path: go/go.sum
      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "以下文件未格式化："
            echo "$unformatted"
            exit 1
          fi
      - name: Vet
        run: go vet ./...
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...
      - name: Lint
        # v7 对应 golangci-lint v2;pin v2.12.2(预编译二进制用 go1.26 构建，
        # 满足 go.mod 的 go 1.26 目标，不会触发版本门槛报错）。
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12.2
          working-directory: go
